<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Login - TEVCOL</title>

  <!-- Skydash vendor css -->
  <link rel="stylesheet" th:href="@{/assets/vendors/feather/feather.css}">
  <link rel="stylesheet" th:href="@{/assets/vendors/ti-icons/css/themify-icons.css}">
  <link rel="stylesheet" th:href="@{/assets/vendors/css/vendor.bundle.base.css}">
  <link rel="stylesheet" th:href="@{/assets/vendors/mdi/css/materialdesignicons.min.css}">

  <!-- Skydash main css -->
  <link rel="stylesheet" th:href="@{/assets/css/style.css}">
  <link rel="shortcut icon" th:href="@{/assets/images/favicon.png}" />
</head>

<body>
<div class="container-scroller">
  <div class="container-fluid page-body-wrapper full-page-wrapper">
    <div class="content-wrapper d-flex align-items-center auth px-0">
      <div class="row w-100 mx-0">
        <div class="col-lg-4 mx-auto">

          <div class="auth-form-light text-left py-5 px-4 px-sm-5">
            <div class="brand-logo">
              <img th:src="@{/assets/images/logo.svg}" alt="logo">
            </div>

            <h4>TEVCOL</h4>
            <h6 class="font-weight-light">Inicia sesión para continuar</h6>

            <div th:if="${param.error}" class="alert alert-danger py-2 mt-3">
              Usuario o contraseña incorrectos
            </div>

            <div th:if="${param.logout}" class="alert alert-success py-2 mt-3">
              Sesión cerrada correctamente
            </div>

            <form class="pt-3" th:action="@{/login}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

              <div class="form-group">
                <input type="text" class="form-control form-control-lg"
                       name="username" placeholder="Usuario" required>
              </div>

              <div class="form-group">
                <input type="password" class="form-control form-control-lg"
                       name="password" placeholder="Contraseña" required>
              </div>

              <div class="mt-3">
                <button class="btn btn-block btn-primary btn-lg font-weight-medium auth-form-btn w-100">
                  ENTRAR
                </button>
              </div>

              <div class="text-muted small mt-3">
                Desarrollado por: Cristian Aguila y Alejandra Erreyes
              </div>
            </form>

          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<!-- Skydash JS -->
<script th:src="@{/assets/vendors/js/vendor.bundle.base.js}"></script>
<script th:src="@{/assets/js/off-canvas.js}"></script>
<script th:src="@{/assets/js/template.js}"></script>
<script th:src="@{/assets/js/settings.js}"></script>
</body>
</html>
