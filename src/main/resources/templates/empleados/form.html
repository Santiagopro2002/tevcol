<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head('Formulario Empleado')}"></head>

<body>

<div th:replace="~{base :: layout(~{::section})}">
  <section>

    <div class="card">
      <div class="card-body">
        <h4 class="card-title"
            th:text="${empleado.codigoEmp == null ? 'Empleado nuevo' : 'Editar Empleado'}"></h4>

        <form id="frmEmpleado"
              th:action="@{/empleados/guardar}"
              th:object="${empleado}"
              method="post" novalidate>

          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <input type="hidden" th:field="*{codigoEmp}"/>

          <div class="row g-3">

            <div class="col-md-4">
              <label class="form-label">Identificación (Cédula) <span class="text-danger">*</span></label>
              <input class="form-control"
                     th:field="*{identificacionEmp}"
                     name="identificacionEmp"
                     id="identificacionEmp"
                     maxlength="10" required>
            </div>

            <div class="col-md-4">
              <label class="form-label">Nombre <span class="text-danger">*</span></label>
              <input class="form-control"
                     th:field="*{nombreEmp}"
                     name="nombreEmp"
                     id="nombreEmp"
                     maxlength="100" required>
            </div>

            <div class="col-md-4">
              <label class="form-label">Segundo nombre <span class="text-danger">*</span></label>
              <input class="form-control"
                     th:field="*{segundoNombreEmp}"
                     name="segundoNombreEmp"
                     id="segundoNombreEmp"
                     maxlength="100" required>
            </div>

            <div class="col-md-4">
              <label class="form-label">Apellido <span class="text-danger">*</span></label>
              <input class="form-control"
                     th:field="*{apellidoEmp}"
                     name="apellidoEmp"
                     id="apellidoEmp"
                     maxlength="100" required>
            </div>

            <div class="col-md-4">
              <label class="form-label">Segundo apellido <span class="text-danger">*</span></label>
              <input class="form-control"
                     th:field="*{segundoApellidoEmp}"
                     name="segundoApellidoEmp"
                     id="segundoApellidoEmp"
                     maxlength="100" required>
            </div>

            <div class="col-md-4">
              <label class="form-label">Email <span class="text-danger">*</span></label>
              <input class="form-control"
                     type="email"
                     th:field="*{emailEmp}"
                     name="emailEmp"
                     id="emailEmp"
                     maxlength="250" required>
            </div>

            <div class="col-md-4">
              <label class="form-label">Estado <span class="text-danger">*</span></label>
              <select class="form-select" th:field="*{estadoEmp}" name="estadoEmp" id="estadoEmp" required>
                <option value="">-- Seleccione --</option>
                <option value="ACTIVO">ACTIVO</option>
                <option value="INACTIVO">INACTIVO</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">Fecha nacimiento <span class="text-danger">*</span></label>
              <input class="form-control"
                     type="date"
                     th:field="*{fechaNacimientoEmp}"
                     name="fechaNacimientoEmp"
                     id="fechaNacimientoEmp" required>
            </div>

            <div class="col-md-4">
              <label class="form-label">Establecimiento <span class="text-danger">*</span></label>
              <select class="form-select" name="establecimientoId" id="establecimientoId" required>
                <option value="">-- Seleccione --</option>
                <option th:each="est : ${establecimientos}"
                        th:value="${est.codigoEst}"
                        th:text="${est.descripcionEst}"
                        th:selected="${empleado.establecimiento != null && empleado.establecimiento.codigoEst == est.codigoEst}">
                </option>
              </select>
            </div>

          </div>

          <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary btn-sm" type="submit">
              <i class="ti-save"></i> Guardar
            </button>
            <a class="btn btn-secondary btn-sm" th:href="@{/empleados}">Cancelar</a>
          </div>

        </form>
      </div>
    </div>

  </section>
</div>

<!--  Script DESPUÉS del layout -->
<script>
  // Bootstrap look
  $.validator.setDefaults({
    errorElement: "div",
    errorClass: "invalid-feedback",
    highlight: function(el){ $(el).addClass("is-invalid"); },
    unhighlight: function(el){ $(el).removeClass("is-invalid"); },
    errorPlacement: function(error, element){ error.insertAfter(element); }
  });

  // Solo letras
  $.validator.addMethod("soloLetras", function (value, element) {
    return this.optional(element) || /^[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+$/.test(value);
  }, "Solo se permiten letras");

  // Cédula EC
  $.validator.addMethod("cedulaEC", function (value) {
    value = (value || "").replace(/\D/g,"");
    if (!/^\d{10}$/.test(value)) return false;

    let total = 0;
    let provincia = parseInt(value.substring(0, 2), 10);
    if (provincia < 1 || provincia > 24) return false;

    let digitoVerificador = parseInt(value.charAt(9), 10);

    for (let i = 0; i < 9; i++) {
      let digito = parseInt(value.charAt(i), 10);
      if (i % 2 === 0) {
        digito *= 2;
        if (digito > 9) digito -= 9;
      }
      total += digito;
    }

    let decena = Math.ceil(total / 10) * 10;
    let resultado = decena - total;
    if (resultado === 10) resultado = 0;

    return resultado === digitoVerificador;
  }, "Cédula ecuatoriana inválida");

  $(function(){
    $("#frmEmpleado").validate({
      rules: {
        identificacionEmp: { required:true, digits:true, minlength:10, maxlength:10, cedulaEC:true },
        nombreEmp: { required:true, minlength:2, soloLetras:true },
        segundoNombreEmp: { required:true, minlength:2, soloLetras:true },
        apellidoEmp: { required:true, minlength:2, soloLetras:true },
        segundoApellidoEmp: { required:true, minlength:2, soloLetras:true },
        emailEmp: { required:true, email:true },
        estadoEmp: { required:true },
        fechaNacimientoEmp: { required:true },
        establecimientoId: { required:true }
      },
      messages: {
        identificacionEmp: {
          required: "Ingrese la cédula",
          digits: "Solo números",
          minlength: "Debe tener 10 dígitos",
          maxlength: "Debe tener 10 dígitos"
        },
        estadoEmp: { required: "Seleccione un estado" },
        establecimientoId: { required: "Seleccione un establecimiento" }
      }
    });
  });
</script>

</body>
</html>
