<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head('Empleados')}"></head>

<body>
<div th:replace="~{base :: layout(~{::section})}">
  <section>

    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h3 class="font-weight-bold mb-0">Empleados</h3>
        <small class="text-muted">Listado general de empleados registrados</small>
      </div>

      <a class="btn btn-primary btn-sm" th:href="@{/empleados/nuevo}">
        <i class="ti-plus"></i> Nuevo
      </a>
    </div>

    <div class="card">
      <div class="card-body">
        <div class="table-responsive">
          <table id="tablaEmpleados" class="table table-striped table-hover align-middle w-100">
            <thead>
            <tr>
              <th>ID</th>
              <th>Identificación</th>
              <th>Nombres</th>
              <th>Apellidos</th>
              <th>Email</th>
              <th>Establecimiento</th>
              <th class="text-center" style="width:140px;">Acciones</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="e : ${lista}">
              <td th:text="${e.codigoEmp}"></td>
              <td th:text="${e.identificacionEmp}"></td>
              <td th:text="${(e.nombreEmp ?: '') + ' ' + (e.segundoNombreEmp ?: '')}"></td>
              <td th:text="${(e.apellidoEmp ?: '') + ' ' + (e.segundoApellidoEmp ?: '')}"></td>
              <td th:text="${e.emailEmp}"></td>
              <td th:text="${e.establecimiento != null ? e.establecimiento.descripcionEst : '-'}"></td>

              <td class="text-center">
                <a class="btn btn-warning btn-sm"
                   th:href="@{/empleados/editar/{id}(id=${e.codigoEmp})}" title="Editar">
                  <i class="ti-pencil"></i>
                </a>

                <form th:action="@{/empleados/eliminar/{id}(id=${e.codigoEmp})}"
                      method="post" class="d-inline frmDelete">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                  <button type="submit" class="btn btn-danger btn-sm" title="Eliminar">
                    <i class="ti-trash"></i>
                  </button>
                </form>
              </td>
            </tr>

            <tr th:if="${#lists.isEmpty(lista)}">
              <td colspan="7" class="text-center text-muted py-4">No existen empleados registrados.</td>
            </tr>
            </tbody>

          </table>
        </div>
      </div>
    </div>

  </section>
</div>

<script>
  $(function(){
    console.log("jQuery:", typeof $);
console.log("DataTable:", typeof $.fn.dataTable);
    const tabla = $('#tablaEmpleados').DataTable({
      language: { url: "https://cdn.datatables.net/plug-ins/1.13.8/i18n/es-ES.json" },
      dom: "<'row mb-3'<'col-md-6'B><'col-md-6'f>>" +
           "<'row'<'col-12'tr>>" +
           "<'row mt-3'<'col-md-5'i><'col-md-7'p>>",
      buttons: [
        { extend: 'excelHtml5', text: 'Excel', className: 'btn btn-success btn-sm' },
        { extend: 'pdfHtml5', text: 'PDF', className: 'btn btn-danger btn-sm', title: 'Empleados' },
        { extend: 'print', text: 'Imprimir', className: 'btn btn-secondary btn-sm', title: 'Empleados' }
      ],
      pageLength: 10,
       order: [ [0, "desc"] ],
      columnDefs: [{ orderable:false, targets:6 }]
    });

    // Delegado (funciona aunque DataTables re-renderice)
    $(document).on('submit', '.frmDelete', function(e){
      e.preventDefault();
      const form = this;
      Swal.fire({
        title: '¿Eliminar empleado?',
        text: 'Esta acción no se puede deshacer',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Sí, eliminar',
        cancelButtonText: 'Cancelar'
      }).then(r => { if(r.isConfirmed) form.submit(); });
    });

  });
</script>

</body>
</html>
