<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title th:text="${title}">TEVCOL</title>

  <!-- Skydash vendor css -->
  <link rel="stylesheet" th:href="@{/assets/vendors/feather/feather.css}">
  <link rel="stylesheet" th:href="@{/assets/vendors/ti-icons/css/themify-icons.css}">
  <link rel="stylesheet" th:href="@{/assets/vendors/css/vendor.bundle.base.css}">
  <link rel="stylesheet" th:href="@{/assets/vendors/mdi/css/materialdesignicons.min.css}">

  <!-- DataTables -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.bootstrap5.min.css">

  <!-- Skydash main css -->
  <link rel="stylesheet" th:href="@{/assets/css/style.css}">
  <link rel="shortcut icon" th:href="@{/assets/images/favicon.png}" />

  <!-- NUEVO: script temprano para evitar parpadeo al cargar tema -->
  <script>
    (function () {
      try {
        var savedTheme = localStorage.getItem('tevcol_theme');
        if (savedTheme === 'dark') {
          document.documentElement.classList.add('dark-mode');
        }
      } catch (e) {}
    })();
  </script>

  <!-- NUEVO: estilos modo oscuro (sin tocar tus librerías) -->
  <style>
    /* =========================
       MODO OSCURO TEVCOL (PRO)
       ========================= */
    html.dark-mode,
    body.dark-mode {
      background: #0f172a !important;
      color: #e5e7eb !important;
    }

    body.dark-mode {
      color-scheme: dark;
    }

    /* Fondos principales */
    body.dark-mode,
    body.dark-mode .container-scroller,
    body.dark-mode .container-fluid,
    body.dark-mode .page-body-wrapper,
    body.dark-mode .main-panel,
    body.dark-mode .content-wrapper {
      background: #0f172a !important;
    }

    /* Navbar / Sidebar / Footer */
    body.dark-mode .navbar {
      background: #111827 !important;
      border-bottom: 1px solid #1f2937 !important;
    }

    body.dark-mode .navbar .navbar-menu-wrapper,
    body.dark-mode .navbar .navbar-brand-wrapper {
      background: #111827 !important;
    }

    body.dark-mode .sidebar {
      background: #111827 !important;
      border-right: 1px solid #1f2937 !important;
    }

    body.dark-mode .sidebar .nav .nav-item .nav-link {
      color: #e5e7eb !important;
      background: transparent !important;
      border-radius: 10px;
      transition: all .2s ease;
    }

    body.dark-mode .sidebar .nav .nav-item .nav-link .menu-title,
    body.dark-mode .sidebar .nav .nav-item .nav-link i {
      color: #e5e7eb !important;
    }

    body.dark-mode .sidebar .nav .nav-item .nav-link:hover {
      background: #1f2937 !important;
      color: #ffffff !important;
    }

    body.dark-mode .sidebar .nav .nav-item.active > .nav-link,
    body.dark-mode .sidebar .nav .nav-item .nav-link.active {
      background: #1e293b !important;
      color: #fff !important;
      border-left: 3px solid #3b82f6;
    }

    body.dark-mode .footer {
      background: #111827 !important;
      border-top: 1px solid #1f2937 !important;
    }

    body.dark-mode .footer .text-muted {
      color: #cbd5e1 !important;
    }

    /* Textos generales */
    body.dark-mode h1,
    body.dark-mode h2,
    body.dark-mode h3,
    body.dark-mode h4,
    body.dark-mode h5,
    body.dark-mode h6,
    body.dark-mode p,
    body.dark-mode span,
    body.dark-mode label,
    body.dark-mode small,
    body.dark-mode .text-dark,
    body.dark-mode .page-title,
    body.dark-mode .card-title {
      color: #e5e7eb !important;
    }

    body.dark-mode .text-muted {
      color: #94a3b8 !important;
    }

    /* Cards, boxes, modals */
    body.dark-mode .card,
    body.dark-mode .modal-content,
    body.dark-mode .swal2-popup,
    body.dark-mode .dropdown-menu,
    body.dark-mode .navbar-dropdown {
      background: #111827 !important;
      color: #e5e7eb !important;
      border: 1px solid #1f2937 !important;
      box-shadow: 0 10px 25px rgba(0,0,0,.35);
    }

    body.dark-mode .dropdown-divider {
      border-top-color: #243042 !important;
    }

    body.dark-mode .dropdown-item {
      color: #e5e7eb !important;
    }

    body.dark-mode .dropdown-item:hover,
    body.dark-mode .dropdown-item:focus {
      background: #1f2937 !important;
      color: #ffffff !important;
    }

    /* Formularios */
    body.dark-mode .form-control,
    body.dark-mode .form-select,
    body.dark-mode select,
    body.dark-mode textarea,
    body.dark-mode input {
      background: #0b1220 !important;
      color: #e5e7eb !important;
      border: 1px solid #334155 !important;
    }

    body.dark-mode .form-control::placeholder,
    body.dark-mode input::placeholder,
    body.dark-mode textarea::placeholder {
      color: #94a3b8 !important;
    }

    body.dark-mode .form-control:focus,
    body.dark-mode .form-select:focus,
    body.dark-mode input:focus,
    body.dark-mode textarea:focus,
    body.dark-mode select:focus {
      background: #0b1220 !important;
      color: #fff !important;
      border-color: #3b82f6 !important;
      box-shadow: 0 0 0 .2rem rgba(59,130,246,.18) !important;
    }

    /* Tablas */
    body.dark-mode table,
    body.dark-mode .table {
      color: #e5e7eb !important;
      background: transparent !important;
    }

    body.dark-mode .table thead th {
      background: #111827 !important;
      color: #f8fafc !important;
      border-color: #243042 !important;
    }

    body.dark-mode .table td,
    body.dark-mode .table th {
      border-color: #243042 !important;
    }

    body.dark-mode .table-striped tbody tr:nth-of-type(odd) {
      background-color: rgba(255,255,255,.02) !important;
    }

    /* DataTables */
    body.dark-mode .dataTables_wrapper,
    body.dark-mode .dataTables_wrapper .dataTables_info,
    body.dark-mode .dataTables_wrapper .dataTables_length,
    body.dark-mode .dataTables_wrapper .dataTables_filter,
    body.dark-mode .dataTables_wrapper .dataTables_paginate {
      color: #e5e7eb !important;
    }

    body.dark-mode .dataTables_wrapper .dataTables_filter input,
    body.dark-mode .dataTables_wrapper .dataTables_length select {
      background: #0b1220 !important;
      color: #e5e7eb !important;
      border: 1px solid #334155 !important;
    }

    body.dark-mode .page-link {
      background: #111827 !important;
      color: #e5e7eb !important;
      border-color: #334155 !important;
    }

    body.dark-mode .page-item.active .page-link {
      background: #2563eb !important;
      border-color: #2563eb !important;
      color: #fff !important;
    }

    body.dark-mode .page-item.disabled .page-link {
      background: #0f172a !important;
      color: #64748b !important;
      border-color: #243042 !important;
    }

    /* Botones secundarios */
    body.dark-mode .btn-light {
      background: #1f2937 !important;
      border-color: #334155 !important;
      color: #e5e7eb !important;
    }

    body.dark-mode .btn-outline-secondary {
      color: #e5e7eb !important;
      border-color: #475569 !important;
    }

    body.dark-mode .btn-outline-secondary:hover {
      background: #1f2937 !important;
      color: #fff !important;
    }

    /* Links */
    body.dark-mode a {
      color: #93c5fd;
    }

    body.dark-mode a:hover {
      color: #bfdbfe;
    }

    /* SweetAlert modo oscuro */
    body.dark-mode .swal2-title,
    body.dark-mode .swal2-html-container {
      color: #e5e7eb !important;
    }

    /* Toggle de tema en dropdown */
    .theme-toggle-btn {
      cursor: pointer;
      user-select: none;
    }

    .theme-toggle-btn .theme-toggle-left {
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .theme-switch-pill {
      min-width: 54px;
      height: 26px;
      border-radius: 999px;
      position: relative;
      border: 1px solid #d1d5db;
      background: #e5e7eb;
      transition: all .25s ease;
      display: inline-block;
      vertical-align: middle;
    }

    .theme-switch-pill::after {
      content: "";
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ffffff;
      position: absolute;
      top: 2px;
      left: 2px;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
      transition: all .25s ease;
    }

    .theme-switch-pill.is-on {
      background: #2563eb;
      border-color: #2563eb;
    }

    .theme-switch-pill.is-on::after {
      left: 30px;
      background: #fff;
    }

    .theme-switch-state {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .4px;
      margin-left: .45rem;
      opacity: .9;
    }

    body.dark-mode .theme-toggle-btn .theme-switch-state {
      color: #bfdbfe !important;
    }

    /* Pequeños detalles pro */
    body.dark-mode .navbar .nav-link img {
      border: 2px solid #334155;
      box-shadow: 0 0 0 2px rgba(59,130,246,.15);
      border-radius: 50%;
    }

    body.dark-mode .content-wrapper .card,
    body.dark-mode .content-wrapper > div > .row > div > .card {
      border-radius: 12px;
    }

    /* Si hay hr */
    body.dark-mode hr {
      border-color: #243042 !important;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav th:fragment="navbar" class="navbar col-lg-12 col-12 p-0 fixed-top d-flex flex-row">
  <div class="text-center navbar-brand-wrapper d-flex align-items-center justify-content-start">
    <a class="navbar-brand brand-logo me-5" th:href="@{/empleados}">
      <img th:src="@{/assets/images/logo.svg}" class="me-2" alt="logo"/>
    </a>
    <a class="navbar-brand brand-logo-mini" th:href="@{/empleados}">
      <img th:src="@{/assets/images/logo-mini.svg}" alt="logo"/>
    </a>
  </div>

  <div class="navbar-menu-wrapper d-flex align-items-center justify-content-end">

    <ul class="navbar-nav navbar-nav-right">

          <img th:src="@{/assets/images/faces/face28.jpg}" alt="profile" />
        </a>

        <!-- usamos ambas clases para compatibilidad bs4/bs5 -->
        <div class="dropdown-menu dropdown-menu-right dropdown-menu-end navbar-dropdown"
             aria-labelledby="profileDropdown">
          <div class="dropdown-item text-muted small">
            Usuario: <b th:text="${usuarioLogeado != null ? usuarioLogeado : '-'}">-</b>

          <div class="dropdown-divider"></div>

          <!-- NUEVO: BOTÓN MODO OSCURO -->

            <span class="theme-toggle-left">

            <span class="d-flex align-items-center">

<!-- SIDEBAR -->

      <a class="nav-link" th:href="@{/establecimientos}">

<!-- SCRIPTS -->
<div th:fragment="scripts">
  <!-- Skydash vendor (aquí viene jQuery y Bootstrap del template) -->
  <script th:src="@{/assets/vendors/js/vendor.bundle.base.js}"></script>

  <!-- jQuery Validate -->
  <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/localization/messages_es.min.js"></script>

  <!-- SweetAlert -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- DataTables -->
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

  <!-- Buttons -->

  <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.bootstrap5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.print.min.js"></script>

  <!-- Skydash -->
  <script th:src="@{/assets/js/off-canvas.js}"></script>
  <script th:src="@{/assets/js/template.js}"></script>
  <script th:src="@{/assets/js/settings.js}"></script>

  <!-- FIX dropdown perfil (compatibilidad Bootstrap 4/5) -->
  <script>
    (function () {
      document.addEventListener('DOMContentLoaded', function () {
        var trigger = document.getElementById('profileDropdown');
        if (!trigger) return;

        // Si es Bootstrap 5
        if (window.bootstrap && typeof window.bootstrap.Dropdown !== 'undefined') {
          try { window.bootstrap.Dropdown.getOrCreateInstance(trigger); } catch (e) {}
          return;
        }

        // Si es Bootstrap 4 (plugin jQuery)
        if (window.jQuery && typeof window.jQuery.fn.dropdown === 'function') {
          try { window.jQuery(trigger).dropdown(); } catch (e) {}
          return;
        }

        // Fallback manual por si el plugin no inicializa
        var menu = trigger.nextElementSibling;
        if (!menu) return;

        trigger.addEventListener('click', function (e) {
          e.preventDefault();
          menu.classList.toggle('show');
          trigger.setAttribute('aria-expanded', menu.classList.contains('show') ? 'true' : 'false');
        });

        document.addEventListener('click', function (e) {
          if (!trigger.contains(e.target) && !menu.contains(e.target)) {
            menu.classList.remove('show');
            trigger.setAttribute('aria-expanded', 'false');
          }
        });
      });
    })();
  </script>

  <!-- NUEVO: funcionalidad modo oscuro (persistente) -->
  <script>
    (function () {
      var STORAGE_KEY = 'tevcol_theme';

      function isDark() {
        return document.body.classList.contains('dark-mode');
      }

      function setTheme(mode) {
        var dark = (mode === 'dark');

        // Aplicar clase en html + body
        document.documentElement.classList.toggle('dark-mode', dark);
        document.body.classList.toggle('dark-mode', dark);

        // Actualizar UI del botón (si existe)
        var icon = document.getElementById('themeToggleIcon');
        var text = document.getElementById('themeToggleText');
        var state = document.getElementById('themeToggleState');
        var pill = document.getElementById('themeTogglePill');

        if (icon) {
          icon.className = dark ? 'mdi mdi-white-balance-sunny' : 'mdi mdi-weather-night';
        }
        if (text) {
          text.textContent = dark ? 'Modo claro' : 'Modo oscuro';
        }
        if (state) {
          state.textContent = dark ? 'ON' : 'OFF';
        }
        if (pill) {
          pill.classList.toggle('is-on', dark);
        }

        // Guardar preferencia
        try {
          localStorage.setItem(STORAGE_KEY, dark ? 'dark' : 'light');
        } catch (e) {}
      }

      function initTheme() {
        var saved = null;
        try {
          saved = localStorage.getItem(STORAGE_KEY);
        } catch (e) {}

        // Si no hay preferencia guardada, opcional: respeta sistema
        if (!saved) {
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          saved = prefersDark ? 'dark' : 'light';
        }

        setTheme(saved);
      }

      document.addEventListener('DOMContentLoaded', function () {
        initTheme();

        var btn = document.getElementById('themeToggleBtn');
        if (btn) {
          btn.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation(); // para que no cierre el dropdown inmediatamente
            setTheme(isDark() ? 'light' : 'dark');
          });
        }

        // Bonus: si quieres cerrar el dropdown al hacer click otra vez, no hacemos nada aquí
        // porque el stopPropagation es para que el usuario vea el cambio en vivo.
      });
    })();
  </script>
</div>

<!-- ALERTAS GLOBALES -->
<div th:fragment="flashAlerts">
  <script th:if="${error}">
    Swal.fire({ icon:'error', title:'Error', text:'[[${error}]]' });
  </script>
  <script th:if="${success}">
    Swal.fire({ icon:'success', title:'Correcto', text:'[[${success}]]', timer:1800, showConfirmButton:false });
  </script>
</div>

<!-- LAYOUT PRINCIPAL (1 parámetro como antes) -->
<div th:fragment="layout(content)">
  <div class="container-scroller">
    <div th:replace="~{base :: navbar}"></div>

    <div class="container-fluid page-body-wrapper">
      <div th:replace="~{base :: sidebar}"></div>

      <div class="main-panel">
        <div class="content-wrapper">
          <div th:replace="${content}"></div>
        </div>

        <div th:replace="~{base :: footer}"></div>
      </div>
    </div>
  </div>

  <div th:replace="~{base :: scripts}"></div>
  <div th:replace="~{base :: flashAlerts}"></div>
</div>

</body>
</html>
