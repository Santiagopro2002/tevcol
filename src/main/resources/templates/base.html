<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title th:text="${title}">TEVCOL</title>

  <!-- APLICAR TEMA ANTES DE RENDER (evita parpadeo entre páginas) -->
  <script>
    (function () {
      try {
        var savedTheme = localStorage.getItem('tevcold_theme');
        if (savedTheme === 'dark') {
          document.documentElement.classList.add('dark-mode');
          document.documentElement.setAttribute('data-bs-theme', 'dark');
        }
      } catch (e) {}
    })();
  </script>

  <!-- Skydash vendor css -->
  <link rel="stylesheet" th:href="@{/assets/vendors/feather/feather.css}">
  <link rel="stylesheet" th:href="@{/assets/vendors/ti-icons/css/themify-icons.css}">
  <link rel="stylesheet" th:href="@{/assets/vendors/css/vendor.bundle.base.css}">
  <link rel="stylesheet" th:href="@{/assets/vendors/mdi/css/materialdesignicons.min.css}">

  <!-- DataTables -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.bootstrap5.min.css">

  <!-- Skydash main css -->
  <link rel="stylesheet" th:href="@{/assets/css/style.css}">
  <link rel="shortcut icon" th:href="@{/assets/images/favicon.png}" />

  <!-- =========================
       TEMA OSCURO PRO (Bootstrap-like dark)
       ========================= -->
  <style>
    /* Variables estilo Bootstrap 5 dark */
    html.dark-mode {
      --td-body-bg: #212529;
      --td-surface: #2b3035;
      --td-surface-2: #343a40;
      --td-surface-3: #3a4148;
      --td-border: #495057;
      --td-text: #f8f9fa;
      --td-text-soft: #ced4da;
      --td-text-muted: #adb5bd;
      --td-accent: #6c757d;      /* plomo */
      --td-accent-2: #5c636a;    /* plomo hover */
      --td-accent-3: #4b5258;
      --td-danger: #6c757d;      /* en dark, acciones uniformes plomo */
      --td-warning: #6c757d;
      --td-success: #6c757d;
      --td-primary: #495057;
      --td-shadow: none;
    }

    /* Transición suave */
    body, .navbar, .sidebar, .main-panel, .content-wrapper, .card, .dropdown-menu, .table, .footer {
      transition: background-color .18s ease, color .18s ease, border-color .18s ease;
    }

    /* ===== Base layout ===== */
    html.dark-mode body {
      background-color: var(--td-body-bg) !important;
      color: var(--td-text) !important;
    }

    html.dark-mode .container-scroller,
    html.dark-mode .page-body-wrapper,
    html.dark-mode .main-panel,
    html.dark-mode .content-wrapper {
      background: var(--td-body-bg) !important;
      color: var(--td-text) !important;
    }

    /* Navbar */
    html.dark-mode .navbar {
      background: #1b1f23 !important;
      border-bottom: 1px solid var(--td-border) !important;
      box-shadow: none !important;
    }

    html.dark-mode .navbar .navbar-brand-wrapper {
      background: #1b1f23 !important;
      border-right: 1px solid rgba(255,255,255,.04);
    }

    html.dark-mode .navbar .text-dark {
      color: var(--td-text) !important;
    }

    html.dark-mode .navbar .icon-menu,
    html.dark-mode .navbar .navbar-toggler {
      color: var(--td-text) !important;
    }

    /* Sidebar */
    html.dark-mode .sidebar {
      background: #1f2328 !important;
      border-right: 1px solid var(--td-border) !important;
      box-shadow: none !important;
    }

    html.dark-mode .sidebar .nav .nav-item .nav-link {
      color: var(--td-text-soft) !important;
      background: transparent !important;
      border-radius: .6rem;
      margin: 4px 10px;
    }

    html.dark-mode .sidebar .nav .nav-item .nav-link .menu-title,
    html.dark-mode .sidebar .nav .nav-item .nav-link i {
      color: var(--td-text-soft) !important;
    }

    html.dark-mode .sidebar .nav .nav-item.active > .nav-link,
    html.dark-mode .sidebar .nav .nav-item .nav-link.active,
    html.dark-mode .sidebar .nav .nav-item .nav-link:hover {
      background: #2d333b !important;
      color: #fff !important;
      box-shadow: none !important;
    }

    html.dark-mode .sidebar .nav .nav-item.active > .nav-link .menu-title,
    html.dark-mode .sidebar .nav .nav-item.active > .nav-link i,
    html.dark-mode .sidebar .nav .nav-item .nav-link:hover .menu-title,
    html.dark-mode .sidebar .nav .nav-item .nav-link:hover i {
      color: #fff !important;
    }

    /* Fix botón cerrar sesión en sidebar */
    .sidebar-logout-form {
      width: 100%;
    }

    .sidebar-logout-btn {
      width: 100%;
      text-align: left;
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      justify-content: flex-start;
      border-radius: .6rem !important;
      border: 1px solid transparent;
    }

    .sidebar-logout-btn i {
      margin-right: .2rem;
    }

    /* Cuando el sidebar está colapsado (Skydash) */
    .sidebar-icon-only .sidebar .sidebar-logout-form {
      display: flex !important;
      justify-content: center !important;
    }

    .sidebar-icon-only .sidebar .sidebar-logout-btn {
      width: 42px !important;
      min-width: 42px !important;
      height: 42px !important;
      padding: 0 !important;
      justify-content: center !important;
      border-radius: 10px !important;
      margin: 0 auto !important;
    }

    .sidebar-icon-only .sidebar .sidebar-logout-btn i {
      margin-right: 0 !important;
    }

    .sidebar-icon-only .sidebar .sidebar-link-text {
      display: none !important;
    }

    /* Cards / Contenedores */
    html.dark-mode .card {
      background: var(--td-surface) !important;
      border: 1px solid var(--td-border) !important;
      box-shadow: none !important; /* quitamos sombras blancas */
    }

    html.dark-mode .card .card-body {
      background: transparent !important;
      color: var(--td-text) !important;
      box-shadow: none !important;
    }

    html.dark-mode .table-responsive {
      background: transparent !important;
      box-shadow: none !important;
    }

    /* Textos */
    html.dark-mode h1,
    html.dark-mode h2,
    html.dark-mode h3,
    html.dark-mode h4,
    html.dark-mode h5,
    html.dark-mode h6,
    html.dark-mode label,
    html.dark-mode .form-label,
    html.dark-mode .menu-title,
    html.dark-mode .page-title {
      color: var(--td-text) !important;
    }

    html.dark-mode .text-muted,
    html.dark-mode small.text-muted,
    html.dark-mode .text-muted * {
      color: var(--td-text-muted) !important;
    }

    /* Footer */
    html.dark-mode .footer {
      background: #1f2328 !important;
      border-top: 1px solid var(--td-border) !important;
      box-shadow: none !important;
    }

    html.dark-mode .footer .text-muted {
      color: var(--td-text-muted) !important;
    }

    /* Dropdown perfil */
    html.dark-mode .dropdown-menu {
      background: #2b3035 !important;
      border: 1px solid var(--td-border) !important;
      box-shadow: 0 8px 24px rgba(0,0,0,.25) !important;
    }

    html.dark-mode .dropdown-item {
      color: var(--td-text-soft) !important;
    }

    html.dark-mode .dropdown-item:hover,
    html.dark-mode .dropdown-item:focus {
      background: #343a40 !important;
      color: #fff !important;
    }

    html.dark-mode .dropdown-divider {
      border-top-color: var(--td-border) !important;
    }

    /* Inputs / forms */
    html.dark-mode .form-control,
    html.dark-mode .form-select,
    html.dark-mode input,
    html.dark-mode textarea,
    html.dark-mode select {
      background-color: #2b3035 !important;
      color: #f8f9fa !important;
      border: 1px solid var(--td-border) !important;
      box-shadow: none !important;
    }

    html.dark-mode .form-control:focus,
    html.dark-mode .form-select:focus,
    html.dark-mode input:focus,
    html.dark-mode textarea:focus,
    html.dark-mode select:focus {
      border-color: #6c757d !important;
      box-shadow: 0 0 0 .15rem rgba(108,117,125,.25) !important;
    }

    html.dark-mode ::placeholder {
      color: #adb5bd !important;
      opacity: 1;
    }

    /* Botones: estilo plomo elegante en dark */
    html.dark-mode .btn {
      box-shadow: none !important;
      border-width: 1px !important;
    }

    html.dark-mode .btn-primary,
    html.dark-mode .btn-secondary,
    html.dark-mode .btn-success,
    html.dark-mode .btn-warning,
    html.dark-mode .btn-danger,
    html.dark-mode .btn-info {
      background-color: #495057 !important;
      border-color: #6c757d !important;
      color: #fff !important;
    }

    html.dark-mode .btn-primary:hover,
    html.dark-mode .btn-secondary:hover,
    html.dark-mode .btn-success:hover,
    html.dark-mode .btn-warning:hover,
    html.dark-mode .btn-danger:hover,
    html.dark-mode .btn-info:hover {
      background-color: #5c636a !important;
      border-color: #6c757d !important;
      color: #fff !important;
    }

    html.dark-mode .btn-primary:focus,
    html.dark-mode .btn-secondary:focus,
    html.dark-mode .btn-success:focus,
    html.dark-mode .btn-warning:focus,
    html.dark-mode .btn-danger:focus,
    html.dark-mode .btn-info:focus {
      box-shadow: 0 0 0 .15rem rgba(108,117,125,.30) !important;
    }

    html.dark-mode .btn-outline-secondary {
      color: #f8f9fa !important;
      border-color: #6c757d !important;
    }

    html.dark-mode .btn-outline-secondary:hover {
      background: #495057 !important;
      color: #fff !important;
    }

    /* ===== DataTables (fix fuerte para que no salga blanco) ===== */
    html.dark-mode table,
    html.dark-mode .table {
      color: var(--td-text) !important;
      background: transparent !important;
    }

    html.dark-mode .table-striped tbody tr:nth-of-type(odd),
    html.dark-mode .table-striped > tbody > tr:nth-of-type(odd) {
      background-color: #2b3035 !important;
      color: var(--td-text) !important;
    }

    html.dark-mode .table-striped tbody tr:nth-of-type(even),
    html.dark-mode .table-striped > tbody > tr:nth-of-type(even) {
      background-color: #252a2f !important;
      color: var(--td-text) !important;
    }

    html.dark-mode .table-hover tbody tr:hover,
    html.dark-mode .table-hover > tbody > tr:hover {
      background-color: #343a40 !important;
      color: #fff !important;
    }

    html.dark-mode .table thead th,
    html.dark-mode .table tbody td,
    html.dark-mode .table tbody th,
    html.dark-mode .table td,
    html.dark-mode .table th {
      border-color: var(--td-border) !important;
      color: var(--td-text) !important;
      background: transparent !important;
      box-shadow: none !important;
    }

    /* DataTables internals */
    html.dark-mode table.dataTable,
    html.dark-mode table.dataTable.no-footer {
      border-color: var(--td-border) !important;
      background: transparent !important;
    }

    html.dark-mode table.dataTable thead th,
    html.dark-mode table.dataTable thead td {
      color: #f8f9fa !important;
      border-bottom: 1px solid var(--td-border) !important;
      background: #212529 !important;
    }

    html.dark-mode table.dataTable tbody tr,
    html.dark-mode table.dataTable tbody td,
    html.dark-mode table.dataTable tbody th {
      color: #f8f9fa !important;
      border-color: var(--td-border) !important;
      box-shadow: none !important;
    }

    html.dark-mode table.dataTable.display tbody tr.odd,
    html.dark-mode table.dataTable.stripe tbody tr.odd,
    html.dark-mode table.dataTable tbody tr.odd {
      background-color: #2b3035 !important;
    }

    html.dark-mode table.dataTable.display tbody tr.even,
    html.dark-mode table.dataTable.stripe tbody tr.even,
    html.dark-mode table.dataTable tbody tr.even {
      background-color: #252a2f !important;
    }

    html.dark-mode table.dataTable tbody tr:hover {
      background-color: #343a40 !important;
    }

    html.dark-mode .dataTables_wrapper .dataTables_length,
    html.dark-mode .dataTables_wrapper .dataTables_filter,
    html.dark-mode .dataTables_wrapper .dataTables_info,
    html.dark-mode .dataTables_wrapper .dataTables_processing,
    html.dark-mode .dataTables_wrapper .dataTables_paginate {
      color: var(--td-text-soft) !important;
    }

    html.dark-mode .dataTables_wrapper .dataTables_filter input,
    html.dark-mode .dataTables_wrapper .dataTables_length select {
      background: #2b3035 !important;
      color: #f8f9fa !important;
      border: 1px solid var(--td-border) !important;
    }

    html.dark-mode .dataTables_wrapper .dataTables_paginate .paginate_button {
      color: #f8f9fa !important;
      border: 1px solid transparent !important;
      background: transparent !important;
      box-shadow: none !important;
    }

    html.dark-mode .dataTables_wrapper .dataTables_paginate .paginate_button.current,
    html.dark-mode .dataTables_wrapper .dataTables_paginate .paginate_button.current:hover {
      background: #495057 !important;
      color: #fff !important;
      border-color: #6c757d !important;
      box-shadow: none !important;
    }

    html.dark-mode .dataTables_wrapper .dataTables_paginate .paginate_button:hover {
      background: #343a40 !important;
      color: #fff !important;
      border-color: #495057 !important;
    }

    html.dark-mode .dt-button,
    html.dark-mode .buttons-excel,
    html.dark-mode .buttons-pdf,
    html.dark-mode .buttons-print {
      background: #495057 !important;
      color: #fff !important;
      border: 1px solid #6c757d !important;
      box-shadow: none !important;
    }

    html.dark-mode .dt-button:hover,
    html.dark-mode .buttons-excel:hover,
    html.dark-mode .buttons-pdf:hover,
    html.dark-mode .buttons-print:hover {
      background: #5c636a !important;
      border-color: #6c757d !important;
      color: #fff !important;
    }

    /* Sort icons / flechas */
    html.dark-mode table.dataTable thead .sorting:before,
    html.dark-mode table.dataTable thead .sorting:after,
    html.dark-mode table.dataTable thead .sorting_asc:before,
    html.dark-mode table.dataTable thead .sorting_asc:after,
    html.dark-mode table.dataTable thead .sorting_desc:before,
    html.dark-mode table.dataTable thead .sorting_desc:after {
      opacity: .65 !important;
      color: #ced4da !important;
    }

    /* SweetAlert en dark */
    html.dark-mode .swal2-popup {
      background: #2b3035 !important;
      color: #f8f9fa !important;
      border: 1px solid #495057 !important;
    }

    html.dark-mode .swal2-title,
    html.dark-mode .swal2-html-container {
      color: #f8f9fa !important;
    }

    /* Badge / enlaces */
    html.dark-mode a:not(.btn):not(.nav-link):not(.dropdown-item) {
      color: #9ec5fe;
    }

    html.dark-mode a:not(.btn):not(.nav-link):not(.dropdown-item):hover {
      color: #cfe2ff;
    }

    /* Ocultar sombras/efectos blancos del template */
    html.dark-mode .content-wrapper,
    html.dark-mode .main-panel,
    html.dark-mode .card,
    html.dark-mode .navbar,
    html.dark-mode .sidebar,
    html.dark-mode .footer,
    html.dark-mode .table-responsive,
    html.dark-mode .table,
    html.dark-mode .dataTables_wrapper {
      box-shadow: none !important;
      background-image: none !important;
    }

    html.dark-mode nav.navbar,
html.dark-mode .navbar.default-layout,
html.dark-mode .navbar.fixed-top {
  background-color: #1b1f23 !important;
}

html.dark-mode .navbar .navbar-menu-wrapper {
  background-color: #1b1f23 !important;
}
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav th:fragment="navbar" class="navbar col-lg-12 col-12 p-0 fixed-top d-flex flex-row">
  <div class="text-center navbar-brand-wrapper d-flex align-items-center justify-content-start">
    <a class="navbar-brand brand-logo me-5" th:href="@{/empleados}">

    </a>
    <a class="navbar-brand brand-logo-mini" th:href="@{/empleados}">

  <div class="navbar-menu-wrapper d-flex align-items-center justify-content-end">

      <span class="icon-menu"></span>

    <ul class="navbar-nav navbar-nav-right">
      <!-- PERFIL -->
      <li class="nav-item nav-profile dropdown">

        <!-- usamos ambas clases para compatibilidad bs4/bs5 -->
        <div class="dropdown-menu dropdown-menu-right dropdown-menu-end navbar-dropdown"
             aria-labelledby="profileDropdown">
          <div class="dropdown-item text-muted small">

          <div class="dropdown-divider"></div>

          <!-- NUEVO: Toggle modo oscuro -->
          <button type="button" id="themeToggleBtn" class="dropdown-item d-flex align-items-center">

</nav>

  <ul class="nav">

    <li class="nav-item">

    <li class="nav-item">

      © 2026 TEVCOL - Information Systems | Cristian Aguila - Alejandra Erreyes - UTC

<div th:fragment="scripts">
  <!-- Skydash vendor (aquí viene jQuery y Bootstrap del template) -->
  <script th:src="@{/assets/vendors/js/vendor.bundle.base.js}"></script>

  <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.print.min.js"></script>

  <!-- Skydash -->
  <script th:src="@{/assets/js/off-canvas.js}"></script>
  <script th:src="@{/assets/js/template.js}"></script>
  <script th:src="@{/assets/js/settings.js}"></script>

  <!-- FIX dropdown perfil (compatibilidad Bootstrap 4/5) -->
  <script>
    (function () {
      document.addEventListener('DOMContentLoaded', function () {
        var trigger = document.getElementById('profileDropdown');
        if (!trigger) return;

        // Si es Bootstrap 5
        if (window.bootstrap && typeof window.bootstrap.Dropdown !== 'undefined') {
          try { window.bootstrap.Dropdown.getOrCreateInstance(trigger); } catch (e) {}
          return;
        }

        // Si es Bootstrap 4 (plugin jQuery)
        if (window.jQuery && typeof window.jQuery.fn.dropdown === 'function') {
          try { window.jQuery(trigger).dropdown(); } catch (e) {}
          return;
        }

        // Fallback manual por si el plugin no inicializa
        var menu = trigger.nextElementSibling;
        if (!menu) return;

        trigger.addEventListener('click', function (e) {
          e.preventDefault();
          menu.classList.toggle('show');
          trigger.setAttribute('aria-expanded', menu.classList.contains('show') ? 'true' : 'false');
        });

        document.addEventListener('click', function (e) {
          if (!trigger.contains(e.target) && !menu.contains(e.target)) {
            menu.classList.remove('show');
            trigger.setAttribute('aria-expanded', 'false');
          }
        });
      });
    })();
  </script>

  <!-- MODO OSCURO (persistente + rápido) -->
  <script>
    (function () {
      function getTheme() {
        try { return localStorage.getItem('tevcold_theme') || 'light'; } catch (e) { return 'light'; }
      }

      function setTheme(theme) {
        var isDark = theme === 'dark';

        // html (para aplicar antes y durante toda la página)
        document.documentElement.classList.toggle('dark-mode', isDark);
        document.documentElement.setAttribute('data-bs-theme', isDark ? 'dark' : 'light');

        // body (cuando ya existe)
        if (document.body) {
          document.body.classList.toggle('dark-mode', isDark);
        }

        try { localStorage.setItem('tevcold_theme', theme); } catch (e) {}

        // Actualizar texto/icono del botón
        var text = document.getElementById('themeToggleText');
        var icon = document.getElementById('themeToggleIcon');

        if (text) text.textContent = isDark ? 'Modo claro' : 'Modo oscuro';
        if (icon) {
          icon.className = isDark ? 'ti-sun mr-2' : 'ti-moon mr-2';
        }
      }

      function initThemeToggle() {
        // Sincronizar body con html (por si el tema se aplicó en <head>)
        var htmlIsDark = document.documentElement.classList.contains('dark-mode');
        if (document.body) document.body.classList.toggle('dark-mode', htmlIsDark);

        // Botón toggle
        var btn = document.getElementById('themeToggleBtn');
        if (btn && !btn.dataset.bound) {
          btn.dataset.bound = '1';
          btn.addEventListener('click', function (e) {
            e.preventDefault();
            var next = (getTheme() === 'dark') ? 'light' : 'dark';
            setTheme(next);
          });
        }

        // Asegurar texto correcto
        setTheme(getTheme());
      }

      document.addEventListener('DOMContentLoaded', initThemeToggle);
      window.addEventListener('pageshow', initThemeToggle);
    })();
  </script>
</div>

<!-- ALERTAS GLOBALES -->
<div th:fragment="flashAlerts">
  <script th:if="${error}">
    Swal.fire({ icon:'error', title:'Error', text:'[[${error}]]' });
  </script>
  <script th:if="${success}">
    Swal.fire({ icon:'success', title:'Correcto', text:'[[${success}]]', timer:1800, showConfirmButton:false });
  </script>
</div>

<!-- LAYOUT PRINCIPAL (1 parámetro como antes) -->
<div th:fragment="layout(content)">
  <div class="container-scroller">
    <div th:replace="~{base :: navbar}"></div>

    <div class="container-fluid page-body-wrapper">
      <div th:replace="~{base :: sidebar}"></div>

      <div class="main-panel">
        <div class="content-wrapper">
          <div th:replace="${content}"></div>
        </div>

        <div th:replace="~{base :: footer}"></div>
      </div>
    </div>
  </div>

  <div th:replace="~{base :: scripts}"></div>
  <div th:replace="~{base :: flashAlerts}"></div>
</div>

</body>
</html>
